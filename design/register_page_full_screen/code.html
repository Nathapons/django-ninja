<!DOCTYPE html>

      .glass-morphism {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Shell Implementation) -->
<!-- Main Content Area: Reconfigured for Full Page Layout -->
<main class="flex-grow flex h-screen">
<div class="w-full grid grid-cols-1 md:grid-cols-10 h-full overflow-hidden">
<!-- Side Visual Branding (Left 40% on desktop) -->
<div class="hidden md:flex md:col-span-4 bg-primary-container p-12 lg:p-16 xl:p-24 flex-col justify-between text-white relative">
<div class="absolute inset-0 opacity-15" data-alt="High-tech industrial laboratory setting focusing on plastic quality control and AI image detection" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAtflwU4kDbhs231J-nQMdnhJAD_8NjKTXbm9oITqGYIWYrw_QHv7qQMwh6Chf_k2PfIqz1iZ0jXf_JGg5c7RwSa4vbtG-avY3CIWrcxnryVFtzr0R5GTNISPAtoX4CfoUNgiZKGYmtHZuEYM6YzTGKU0Ubl_DLbG2hsZF0gNLRy8tXXjBWHxFrF0bzw87-eIO76x0ozov37lc4owQmttzf3Q7clvXNoy4IK3tV9D0hV3TFpSTtfJop6iN9SA9rQrTpGokLPHQxEivd'); background-size: cover; background-position: center;"></div>
<div class="relative z-10">
<span class="font-headline font-black uppercase text-sm tracking-widest opacity-90">Industrial Alchemist</span>
<h2 class="font-headline font-bold text-4xl lg:text-5xl mt-6 leading-tight">Precision Plastic Lab Registration</h2>
</div>
<div class="relative z-10">
<p class="text-lg opacity-80 font-light leading-relaxed max-w-md">
                        Join our digital repository for advanced defect detection and material analysis.
                    </p>
</div>
</div>
<!-- Registration Form (Right 60% on desktop) -->
<div class="col-span-1 md:col-span-6 bg-white overflow-y-auto">
<div class="h-full flex flex-col justify-center items-center p-8 md:p-16 lg:p-24 xl:p-32">
<div class="w-full max-w-xl">
<div class="mb-12">
<h1 class="font-headline font-extrabold text-4xl text-primary tracking-tight">Create Account</h1>
<div class="h-1.5 w-16 bg-primary-container mt-4"></div>
</div>
<form class="space-y-8">
<!-- Personal Info Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block font-label text-xs font-bold text-outline tracking-wider uppercase">First Name</label>
<input class="w-full px-5 py-4 rounded bg-surface-container-low border-none focus:ring-2 focus:ring-primary-fixed focus:bg-white transition-all text-on-surface placeholder:text-outline-variant text-base" placeholder="John" type="text"/>
</div>
<div class="space-y-2">
<label class="block font-label text-xs font-bold text-outline tracking-wider uppercase">Last Name</label>
<input class="w-full px-5 py-4 rounded bg-surface-container-low border-none focus:ring-2 focus:ring-primary-fixed focus:bg-white transition-all text-on-surface placeholder:text-outline-variant text-base" placeholder="Doe" type="text"/>
</div>
</div>
<!-- Student Number -->
<div class="space-y-2">
<label class="block font-label text-xs font-bold text-outline tracking-wider uppercase">Student Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-xl" data-icon="badge">badge</span>
<input class="w-full pl-12 pr-5 py-4 rounded bg-surface-container-low border-none focus:ring-2 focus:ring-primary-fixed focus:bg-white transition-all text-on-surface placeholder:text-outline-variant text-base" placeholder="e.g. 64XXXXXXXX" type="text"/>
</div>
</div>
<div class="h-px bg-surface-container-high w-full my-4"></div>
<!-- Credentials Row -->
<div class="space-y-2">
<label class="block font-label text-xs font-bold text-outline tracking-wider uppercase">Username</label>
<input class="w-full px-5 py-4 rounded bg-surface-container-low border-none focus:ring-2 focus:ring-primary-fixed focus:bg-white transition-all text-on-surface placeholder:text-outline-variant text-base" placeholder="industrial_chemist_01" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block font-label text-xs font-bold text-outline tracking-wider uppercase">Password</label>
<input class="w-full px-5 py-4 rounded bg-surface-container-low border-none focus:ring-2 focus:ring-primary-fixed focus:bg-white transition-all text-on-surface placeholder:text-outline-variant text-base" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="block font-label text-xs font-bold text-outline tracking-wider uppercase">Confirm Password</label>
<input class="w-full px-5 py-4 rounded bg-surface-container-low border-none focus:ring-2 focus:ring-primary-fixed focus:bg-white transition-all text-on-surface placeholder:text-outline-variant text-base" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-8">
<button class="w-full py-5 bg-primary-container text-white font-headline font-bold rounded-lg shadow-xl shadow-teal-900/20 hover:bg-primary transition-all active:scale-[0.99] flex justify-center items-center gap-3 text-lg" type="submit">
<span>Register</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<div class="text-center mt-8">
<p class="text-base text-outline font-medium">
                                    Already have an account? 
                                    <a class="text-primary-container font-bold hover:underline" href="#">Login</a>
</p>
</div>
</form>
</div>
</div>
</div>
</div>
</main>
<!-- Footer (Shell Implementation) -->
</body></html>
